name: EAS Update

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - '.github/workflows/scraping.yml'
      - 'server/**'
      - 'drizzle/**'

  workflow_dispatch:
    inputs:
      message:
        description: 'Update message'
        required: false
        type: string
        default: 'Manual update'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish update
        run: |
          MESSAGE="${{ github.event.inputs.message || '' }}"
          if [ -z "$MESSAGE" ]; then
            MESSAGE="$(git log -1 --pretty=%s)"
          fi
          eas update --branch production --message "$MESSAGE" --non-interactive
        env:
          EXPO_PUBLIC_API_BASE_URL: https://pachislot-event-app-production.up.railway.app
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Summary
        if: always()
        run: echo "✅ EAS Update published to production branch."
